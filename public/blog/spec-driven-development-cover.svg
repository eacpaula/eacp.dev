    <rect x="894" y="184" width="390" height="126" rx="20" fill="rgba(20,20,18,0.88)" stroke="rgba(255,255,255,0.08)"/>
    <rect x="912" y="202" width="354" height="90" rx="14" fill="rgba(255,255,255,0.02)" stroke="rgba(255,255,255,0.05)"/>
    <text x="940" y="236" fill="#C8A66B" font-family="JetBrains Mono, monospace" font-size="18" font-weight="700" letter-spacing="0.16em">START</text>
    <text x="940" y="272" fill="#F4F1EA" font-family="Inter, sans-serif" font-size="30" font-weight="600">Goal, scope, constraints</text>
  </g>

  <g>
