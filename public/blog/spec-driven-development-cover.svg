<svg width="1600" height="900" viewBox="0 0 1600 900" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Spec-Driven Development editorial cover</title>
  <desc id="desc">Dark technical illustration showing structured specification flow, branching tool comparisons, and AI-assisted engineering motifs with subtle gold accents.</desc>
  <defs>
    <linearGradient id="bg" x1="140" y1="80" x2="1460" y2="860" gradientUnits="userSpaceOnUse">
      <stop stop-color="#171614"/>
      <stop offset="0.52" stop-color="#10100F"/>
      <stop offset="1" stop-color="#080808"/>
    </linearGradient>
    <radialGradient id="glow" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(1140 210) rotate(128) scale(680 420)">
      <stop stop-color="#C8A66B" stop-opacity="0.18"/>
      <stop offset="1" stop-color="#C8A66B" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="goldLine" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#E8D8B0"/>
      <stop offset="1" stop-color="#C8A66B"/>
    </linearGradient>
    <filter id="shadow" x="-30" y="-30" width="1660" height="960" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="24" stdDeviation="26" flood-color="#000000" flood-opacity="0.35"/>
    </filter>
  </defs>

  <rect width="1600" height="900" rx="28" fill="url(#bg)"/>
  <rect width="1600" height="900" rx="28" fill="url(#glow)"/>
  <path d="M93 138C482 67 1086 56 1476 153" stroke="rgba(244,241,234,0.08)" stroke-width="2" stroke-linecap="round"/>
  <path d="M126 802C470 742 1128 732 1460 820" stroke="rgba(244,241,234,0.06)" stroke-width="2" stroke-linecap="round"/>
  <path d="M120 204L1480 204" stroke="rgba(244,241,234,0.08)" stroke-dasharray="8 12"/>
  <path d="M120 708L1480 708" stroke="rgba(244,241,234,0.06)" stroke-dasharray="8 12"/>

  <g filter="url(#shadow)">
    <rect x="96" y="108" width="1408" height="684" rx="26" fill="rgba(17,17,15,0.78)" stroke="rgba(255,255,255,0.08)"/>
    <rect x="114" y="126" width="1372" height="648" rx="22" fill="rgba(255,255,255,0.015)" stroke="rgba(255,255,255,0.05)"/>
  </g>

  <g opacity="0.9">
