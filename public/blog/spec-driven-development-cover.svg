    <text x="196" y="202" fill="#E8D8B0" font-family="JetBrains Mono, monospace" font-size="18" font-weight="700" letter-spacing="0.18em">SPEC FLOW</text>
  </g>

  <text x="170" y="316" fill="#F4F1EA" font-family="Geist, Inter, sans-serif" font-size="88" font-weight="700">Spec-Driven</text>
  <text x="170" y="396" fill="#F4F1EA" font-family="Geist, Inter, sans-serif" font-size="88" font-weight="700">Development</text>
  <text x="174" y="470" fill="#C7C1B5" font-family="Inter, sans-serif" font-size="28" font-weight="400">
    Structured workflow. AI-assisted engineering. Tool comparison with real constraints.
  </text>

  <g opacity="0.9">
    <path d="M208 592H628" stroke="url(#goldLine)" stroke-width="3"/>
    <path d="M208 622H510" stroke="rgba(244,241,234,0.18)" stroke-width="2"/>
    <path d="M208 650H558" stroke="rgba(244,241,234,0.18)" stroke-width="2"/>
  </g>

