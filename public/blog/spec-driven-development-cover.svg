  <g>
    <path d="M1088 408L974 492" stroke="rgba(244,241,234,0.16)" stroke-width="3" stroke-linecap="round"/>
    <path d="M1088 408L1200 492" stroke="rgba(244,241,234,0.16)" stroke-width="3" stroke-linecap="round"/>
    <path d="M1088 408L1088 520" stroke="url(#goldLine)" stroke-width="3" stroke-linecap="round"/>
  </g>

  <g>
    <rect x="826" y="510" width="246" height="136" rx="18" fill="rgba(19,19,17,0.9)" stroke="rgba(255,255,255,0.08)"/>
    <text x="856" y="548" fill="#E8D8B0" font-family="JetBrains Mono, monospace" font-size="17" font-weight="700" letter-spacing="0.14em">OPENSPEC</text>
    <text x="856" y="584" fill="#F4F1EA" font-family="Inter, sans-serif" font-size="22" font-weight="600">Simple start</text>
    <text x="856" y="616" fill="#C7C1B5" font-family="Inter, sans-serif" font-size="18">Useful, flexible, more permissive</text>
  </g>

  <g>
    <rect x="966" y="566" width="246" height="136" rx="18" fill="rgba(19,19,17,0.92)" stroke="rgba(200,166,107,0.42)"/>
    <text x="996" y="604" fill="#E8D8B0" font-family="JetBrains Mono, monospace" font-size="17" font-weight="700" letter-spacing="0.14em">SPEC KIT</text>
    <text x="996" y="640" fill="#F4F1EA" font-family="Inter, sans-serif" font-size="22" font-weight="600">Preferred workflow</text>
    <text x="996" y="672" fill="#C7C1B5" font-family="Inter, sans-serif" font-size="18">Verbose, clearer, better structured</text>
  </g>

  <g>
    <rect x="1108" y="510" width="246" height="136" rx="18" fill="rgba(19,19,17,0.9)" stroke="rgba(255,255,255,0.08)"/>
    <text x="1138" y="548" fill="#E8D8B0" font-family="JetBrains Mono, monospace" font-size="17" font-weight="700" letter-spacing="0.14em">KIRO</text>
    <text x="1138" y="584" fill="#F4F1EA" font-family="Inter, sans-serif" font-size="22" font-weight="600">IDE-native SDD</text>
    <text x="1138" y="616" fill="#C7C1B5" font-family="Inter, sans-serif" font-size="18">Interesting, coherent, less explored</text>
  </g>

  <g opacity="0.82">
    <circle cx="1294" cy="248" r="56" fill="rgba(255,255,255,0.02)" stroke="rgba(255,255,255,0.06)"/>
    <path d="M1264 248H1324" stroke="url(#goldLine)" stroke-width="3" stroke-linecap="round"/>
    <path d="M1294 218V278" stroke="url(#goldLine)" stroke-width="3" stroke-linecap="round"/>
    <circle cx="1294" cy="248" r="14" fill="#C8A66B"/>
  </g>

  <g opacity="0.78">
    <rect x="1252" y="354" width="172" height="52" rx="10" fill="rgba(200,166,107,0.1)" stroke="rgba(200,166,107,0.32)"/>
    <text x="1280" y="388" fill="#E8D8B0" font-family="JetBrains Mono, monospace" font-size="16" font-weight="700" letter-spacing="0.16em">AI ASSIST</text>
  </g>
